# ---------------------------------------------------------------------------
# Buff Return System Configuration
# ---------------------------------------------------------------------------
# When a buff is cancelled, restore it under specific conditions.

# Global toggle for the buff return feature.
# When False, no buffs will be restored under any circumstances.
# Default: False
CancelReturn = False

# Restore buff if the original caster was a Monster or Raid Boss.
# Default: True
ReturnMonster = True

# Restore buff if the original caster was a Player.
# Default: True
ReturnPlayer = True

# Restore buffs for Players who are currently participating in the Olympiad.
# This setting only takes effect when `ReturnPlayer = True`.
# Default: False
ReturnPlayerOlys = False

# Duration (in seconds) before a cancelled buff is automatically restored.
# Applies only when conditions for returning a buff are satisfied.
# Default: 10
TimeToReturn = 10
